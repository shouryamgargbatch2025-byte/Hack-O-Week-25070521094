<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Photographer Portfolio</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(-45deg,#ff6a00,#ee0979,#00c6ff,#0072ff);
background-size:400% 400%;
animation:bgMove 12s infinite alternate;
color:white;
text-align:center;
}

@keyframes bgMove{
0%{background-position:left}
100%{background-position:right}
}

/* PROFILE SECTION */

.profile{
display:flex;
align-items:center;
justify-content:center;
gap:30px;
padding:40px;
flex-wrap:wrap;
}

.profile-img{
width:150px;
height:150px;
border-radius:50%;
object-fit:cover;
border:4px solid white;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.profile-info{
max-width:400px;
}

.profile-info h2{
font-size:32px;
margin-bottom:10px;
}

.profile-info p{
opacity:0.9;
margin-bottom:15px;
}

.socials a{
text-decoration:none;
color:white;
background:rgba(255,255,255,0.2);
padding:8px 15px;
margin-right:10px;
border-radius:20px;
transition:0.3s;
}

.socials a:hover{
background:white;
color:black;
}

/* HEADER */

header{
padding:20px;
}

/* UPLOAD */

.upload{
margin-bottom:20px;
}

.upload input{
padding:10px;
background:white;
border-radius:8px;
cursor:pointer;
}

/* GALLERY */

.gallery{
width:90%;
margin:auto;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:20px;
}

.card{
position:relative;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(10px);
border-radius:15px;
overflow:hidden;
transition:0.4s;
}

.card:hover{
transform:translateY(-8px) scale(1.03);
box-shadow:0 15px 30px rgba(0,0,0,0.4);
}

.card img{
width:100%;
height:250px;
object-fit:cover;
cursor:pointer;
}

/* DELETE BUTTON */

.delete{
position:absolute;
top:10px;
right:10px;
background:red;
border:none;
color:white;
padding:6px 10px;
border-radius:50%;
font-size:14px;
cursor:pointer;
}

/* POPUP VIEW */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.8);
display:none;
justify-content:center;
align-items:center;
}

.popup img{
max-width:80%;
max-height:80%;
border-radius:10px;
}

.popup span{
position:absolute;
top:30px;
right:40px;
font-size:40px;
cursor:pointer;
}

</style>
</head>

<body>

<!-- PROFILE SECTION -->

<section class="profile">

<img src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=400" class="profile-img">

<div class="profile-info">
<h2>Alex Photography</h2>
<p>Capturing moments from today that will wow your heart tomorrow.</p>

<div class="socials">
<a href="#">Instagram</a>
<a href="#">Email</a>
<a href="#">Portfolio</a>
</div>

</div>

</section>

<header>
<h1>📷 Creative Photo Gallery</h1>
<p>Upload • View • Remove</p>
</header>

<div class="upload">
<input type="file" id="upload" multiple accept="image/*">
<p>Upload up to 9 images</p>
</div>

<div class="gallery" id="gallery"></div>

<div class="popup" id="popup">
<span onclick="closePopup()">✖</span>
<img id="popupImg">
</div>

<script>

let gallery=document.getElementById("gallery")
let upload=document.getElementById("upload")
let popup=document.getElementById("popup")
let popupImg=document.getElementById("popupImg")

upload.addEventListener("change",function(){

let files=Array.from(this.files)

files.forEach(file=>{

if(gallery.children.length>=9){
alert("Maximum 9 images allowed")
return
}

let reader=new FileReader()

reader.onload=function(e){

let card=document.createElement("div")
card.className="card"

let img=document.createElement("img")
img.src=e.target.result

img.onclick=function(){
popup.style.display="flex"
popupImg.src=this.src
}

let del=document.createElement("button")
del.className="delete"
del.innerText="✖"

del.onclick=function(event){
event.stopPropagation()
card.remove()
}

card.appendChild(img)
card.appendChild(del)

gallery.appendChild(card)

}

reader.readAsDataURL(file)

})

})

function closePopup(){
popup.style.display="none"
}

</script>

</body>
</html>
